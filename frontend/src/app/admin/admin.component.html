<div class="admin-layout">
  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <div class="sidebar-brand">
      <h1>LinkedU</h1>
      <span>Admin Panel</span>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="statistics" routerLinkActive="active">
        <i class="fas fa-chart-pie"></i> Statistics
      </a>
      <a routerLink="product-keys" routerLinkActive="active">
        <i class="fas fa-key"></i> Product Keys
      </a>
      <a routerLink="users" routerLinkActive="active">
        <i class="fas fa-users"></i> Users
      </a>
      <a routerLink="destinations" routerLinkActive="active">
        <i class="fas fa-globe"></i> Destinations
      </a>
      <a routerLink="quizzes" routerLinkActive="active">
        <i class="fas fa-question-circle"></i> Quizzes
      </a>
    </nav>

    <div class="sidebar-footer">
      <button (click)="logout()">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="admin-main">
    <router-outlet></router-outlet>
  </main>
</div>
