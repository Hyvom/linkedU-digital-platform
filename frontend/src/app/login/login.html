<div class="signup-page">

  <!-- LEFT SIDE FORM -->
  <div class="signup-card">

    <!-- Accent bar -->
    <div class="card-accent-bar"></div>

    <!-- LOGO -->
    <div class="logo-container">
      <img src="/assets/Pictures/logo.png" alt="LinkedU Logo" />
    </div>

    <!-- HEADER -->
    <div class="signup-header">
      <h2>Bon retour !</h2>
      <p>Connectez-vous pour continuer votre parcours</p>
    </div>

    <!-- FORM -->
    <form class="signup-form" (ngSubmit)="onSubmit()">

      <!-- EMAIL -->
      <div class="form-group">
        <label class="form-label">Email ou nom d'utilisateur</label>
        <input class="form-input"
          id="email"
          name="email"
          type="text"
          [(ngModel)]="form.identifier"
          placeholder="vous@exemple.com"
          required />
      </div>

      <!-- PASSWORD -->
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input class="form-input"
          id="password"
          name="password"
          type="password"
          [(ngModel)]="form.password"
          placeholder="••••••••"
          required />
      </div>

      <!-- ERROR -->
      <div *ngIf="errorMessage" class="error-message">
        ⚠️ {{ errorMessage }}
      </div>

      <!-- SUBMIT -->
      <button type="submit" class="submit-btn" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Connexion en cours...' : 'Se connecter' }}
      </button>

      <!-- FOOTER -->
      <div class="signup-footer">
        <br />
        Vous n'avez pas de compte ? <a routerLink="/signup" class="link-yellow">Créer un compte</a>
      </div>

    </form>

  </div>

  <!-- RIGHT SIDE IMAGE -->
  <div class="left-panel">
    <div class="carousel-container">
      <div class="login-image"></div>
      <div class="carousel-overlay"></div>
    </div>
  </div>

</div>
