<div class="signup-page">

  <!-- LEFT IMAGE -->
  <div class="left-panel">
    <div class="carousel-container">
      <div class="image-bg"></div>
      <div class="carousel-overlay"></div>
    </div>
  </div>

  <!-- FORM -->
  <div class="signup-card">

    <div class="card-accent-bar"></div>

    <!-- LOGO -->
    <div class="logo-container">
      <img src="/assets/Pictures/logo.png" alt="LinkedU Logo" />
    </div>

    <!-- HEADER -->
    <div class="signup-header">
      <h2>Join LinkedU</h2>
      <p>Start your study abroad journey</p>
    </div>

    <!-- TABS -->
    <div class="tab-switcher">
      <a routerLink="/signup/guest" class="tab-btn active">
        <i class="fa-solid fa-globe"></i>
        Guest Registration
      </a>
      <a routerLink="/signup/contract" class="tab-btn">
        <i class="fa-solid fa-file-contract"></i>
        Contract Registration
      </a>
    </div>

    <p class="tab-description">
      <i class="fa-solid fa-info-circle"></i>
      Register as a guest to explore our platform.
    </p>

    <form class="signup-form" (ngSubmit)="onSubmit()">

      <div class="input-icon-wrapper">
        <i class="fa-solid fa-user input-icon"></i>
        <input class="form-input" name="username" [(ngModel)]="form.username" placeholder="Username *" required />
      </div>

      <div class="form-row">
        <div class="input-icon-wrapper">
          <i class="fa-solid fa-user-pen input-icon"></i>
          <input class="form-input" name="firstName" [(ngModel)]="form.firstName" placeholder="First name *" required />
        </div>
        <div class="input-icon-wrapper">
          <i class="fa-solid fa-user-pen input-icon"></i>
          <input class="form-input" name="lastName" [(ngModel)]="form.lastName" placeholder="Last name *" required />
        </div>
      </div>
      <br>
      <div class="input-icon-wrapper">
        <i class="fa-solid fa-envelope input-icon"></i>
        <input class="form-input" name="email" type="email" [(ngModel)]="form.email" placeholder="Email address *" required />
      </div>

      <div class="form-row">
        <div class="input-icon-wrapper">
          <i class="fa-solid fa-phone input-icon"></i>
          <input class="form-input" name="phoneNumber" [(ngModel)]="form.phoneNumber" placeholder="Phone number *" required />
        </div>
        <div class="input-icon-wrapper">
          <i class="fa-solid fa-calendar input-icon"></i>
          <input class="form-input" name="birthDate" type="date" [(ngModel)]="form.birthDate" required />
        </div>
      </div>
      <br>
      <div class="input-icon-wrapper">
        <i class="fa-solid fa-location-dot input-icon"></i>
        <input class="form-input" name="address" [(ngModel)]="form.address" placeholder="Address (optional)" />
      </div>

      <!-- PASSWORD -->
      <div class="input-icon-wrapper">
        <i class="fa-solid fa-lock input-icon"></i>
        <input class="form-input" name="password" type="password" [(ngModel)]="form.password" placeholder="Password *" required />
      </div>

      <!-- STRENGTH BAR -->
      <div *ngIf="form.password.length > 0" class="strength-bar">
        <div class="strength-fill"
          [ngClass]="{
            'weak': passwordStrength === 'Weak',
            'medium': passwordStrength === 'Medium',
            'strong': passwordStrength === 'Strong'
          }">
        </div>
      </div>

      <p *ngIf="form.password.length > 0" class="password-strength">
        <i class="fa-solid fa-shield-haltered"></i>
        {{ passwordStrength }}
      </p>

      <!-- CONFIRM PASSWORD -->
      <div class="input-icon-wrapper">
        <i class="fa-solid fa-lock input-icon"></i>
        <input class="form-input"
          name="confirmPassword"
          type="password"
          [(ngModel)]="form.confirmPassword"
          placeholder="Confirm Password *"
          required />
      </div>

      <p *ngIf="form.confirmPassword && !passwordsMatch" class="error-message">
        <i class="fa-solid fa-circle-exclamation"></i>
        Passwords do not match
      </p>

      <div *ngIf="errorMessage" class="error-message">
        <i class="fa-solid fa-circle-exclamation"></i>
        {{ errorMessage }}
      </div>
      <div *ngIf="successMessage" class="success-message">
        <i class="fa-solid fa-circle-check"></i>
        {{ successMessage }}
      </div>

      <button type="submit" class="submit-btn"
        [disabled]="isSubmitting || !passwordsMatch">
        <i *ngIf="!isSubmitting" class="fa-solid fa-user-plus"></i>
        <i *ngIf="isSubmitting" class="fa-solid fa-spinner fa-spin"></i>
        {{ isSubmitting ? 'Creating account...' : 'Create Guest Account' }}
      </button>

    </form>

    <div class="signup-footer">
      Already have an account? <a routerLink="/login">
        <i class="fa-solid fa-sign-in-alt"></i>
        Sign in
      </a>
    </div>

  </div>
</div>
